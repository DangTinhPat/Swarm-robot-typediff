# "/**/<node>" instead of a bare node name so this file loads correctly whether
# controller_manager runs unnamespaced (single robot) or under /<robot_name>/
# (multi-robot) - ROS2 param YAML only auto-matches a bare key against the root
# namespace.
/**/controller_manager:
  ros__parameters:
    update_rate: 30

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    diff_drive_controller:
      type: diff_drive_controller/DiffDriveController

/**/diff_drive_controller:
  ros__parameters:
    left_wheel_names: ["left_wheel_joint"]
    right_wheel_names: ["right_wheel_joint"]

    wheel_separation: 0.266
    wheel_radius: 0.05

    base_frame_id: base_link
    odom_frame_id: odom
    enable_odom_tf: true
    open_loop: false

    cmd_vel_timeout: 0.5

    linear.x.max_velocity: 1.0
    linear.x.min_velocity: -1.0
    linear.x.max_acceleration: 1.0
    linear.x.min_acceleration: -1.0

    angular.z.max_velocity: 2.0
    angular.z.min_velocity: -2.0
    angular.z.max_acceleration: 2.0
    angular.z.min_acceleration: -2.0
