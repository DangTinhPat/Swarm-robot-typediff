amcl:
  ros__parameters:
    # This is robot2's copy of config/nav2_multi.yaml - identical except
    # initial_pose, which is baked in statically per robot instead of computed
    # at launch time. (Two earlier approaches both had real failure modes:
    # publishing to /<robot>/initialpose after bringup raced AMCL's
    # BEST_EFFORT/VOLATILE subscription and could silently drop; generating
    # this file at launch time via an OpaqueFunction added a Python code path
    # - yaml parsing, tempfile creation - that could fail before any node
    # even started. A plain static file has neither failure mode.)
    # robot2's dock is 1m from robot1's along world's +X, which is map's -Y
    # axis (map is world rotated -90deg) - see multi_robot_nav2.launch.py.
    set_initial_pose: true
    initial_pose:
      x: 0.0
      y: -1.0
      z: 0.0
      yaw: 0.0
    alpha1: 0.2
    alpha2: 0.2
    alpha3: 0.2
    alpha4: 0.2
    alpha5: 0.2
    base_frame_id: "base_footprint"
    beam_skip_distance: 0.5
    beam_skip_error_threshold: 0.9
    beam_skip_threshold: 0.3
    do_beamskip: false
    global_frame_id: "map"
    lambda_short: 0.1
    laser_likelihood_max_dist: 2.0
    laser_max_range: 100.0
    laser_min_range: -1.0
    laser_model_type: "likelihood_field"
    max_beams: 60
    max_particles: 2000
    min_particles: 500
    odom_frame_id: "odom"
    pf_err: 0.05
    pf_z: 0.99
    recovery_alpha_fast: 0.0
    recovery_alpha_slow: 0.0
    resample_interval: 1
    robot_model_type: "nav2_amcl::DifferentialMotionModel"
    save_pose_rate: 0.5
    sigma_hit: 0.2
    tf_broadcast: true
    transform_tolerance: 1.0
    update_min_a: 0.2
    update_min_d: 0.25
    z_hit: 0.5
    z_max: 0.05
    z_rand: 0.5
    z_short: 0.05
    scan_topic: scan

bt_navigator:
  ros__parameters:
    global_frame: map
    robot_base_frame: base_link
    odom_topic: odom
    bt_loop_duration: 10
    default_server_timeout: 20
    wait_for_service_timeout: 1000
    action_server_result_timeout: 900.0
    navigators: ["navigate_to_pose", "navigate_through_poses"]
    navigate_to_pose:
      plugin: "nav2_bt_navigator::NavigateToPoseNavigator"
    navigate_through_poses:
      plugin: "nav2_bt_navigator::NavigateThroughPosesNavigator"
    error_code_names:
      - compute_path_error_code
      - follow_path_error_code

controller_server:
  ros__parameters:
    # diff_drive_controller only accepts TwistStamped on /cmd_vel; every node in
    # the velocity pipeline (controller_server, behavior_server, velocity_smoother,
    # collision_monitor, docking_server) must publish/consume the stamped variant.
    # Multi-robot uses the native gz-sim-diff-drive-system plugin (not
    # ros2_control's diff_drive_controller), whose ros_gz_bridge topic is
    # declared as plain geometry_msgs/Twist (see multi_robot.launch.py's
    # bridge_node) - unlike single-robot's nav2.yaml, this must stay false or
    # the final /cmd_vel type (TwistStamped) silently mismatches the bridge
    # and no velocity command ever reaches Gazebo.
    enable_stamped_cmd_vel: false
    controller_frequency: 20.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.5
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.3
    progress_checker_plugins: ["progress_checker"]
    goal_checker_plugins: ["general_goal_checker"] # "precise_goal_checker"
    controller_plugins: ["FollowPath"]
    use_realtime_priority: false

    # Progress checker parameters
    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.5
      movement_time_allowance: 10.0
    # Goal checker parameters
    general_goal_checker:
      stateful: True
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.25
      yaw_goal_tolerance: 0.25
    FollowPath:
      plugin: "teb_local_planner::TebLocalPlannerROS"
      # Switched from MPPI: sampling-based (batch_size x time_steps state
      # rollouts every cycle) was the heaviest node in the stack, and two
      # robots' worth of it starved this machine's CPU (controller_server/
      # planner_server loop rate collapsing to 1-13Hz, see e2e_nav2.log).
      # TEB optimizes a small graph of poses (g2o) instead of sampling
      # thousands of trajectories - lighter per-robot in theory; measure the
      # real CPU delta after this switch rather than assuming a number.
      odom_topic: odom
      map_frame: map
      teb_autosize: 1.0
      dt_ref: 0.3
      dt_hysteresis: 0.1
      max_samples: 500
      global_plan_overwrite_orientation: false
      allow_init_with_backwards_motion: false
      max_global_plan_lookahead_dist: 3.0
      global_plan_viapoint_sep: 0.3
      global_plan_prune_distance: 1.0
      exact_arc_length: false
      feasibility_check_no_poses: 2
      publish_feedback: false

      # Robot - carried over from the velocity_smoother/MPPI tuning below
      # instead of TEB's stock demo defaults (tuned for a much slower robot).
      max_vel_x: 1.0
      max_vel_theta: 2.5
      acc_lim_x: 2.5
      acc_lim_theta: 3.2

      footprint_model:
        type: "circular"
        # Exact circumscribed radius of the real chassis: box is 0.320m x
        # 0.240m centered on base_link (robot_main.xacro: chassis_length/
        # chassis_width, wheel_offset_x cancels the chasis joint's own
        # offset) -> sqrt(0.16^2 + 0.12^2) = 0.20m. Wheels stick out to
        # y=+-0.146 but only near x=0, so they stay inside this circle.
        radius: 0.20  # matches local/global costmap robot_radius below

      free_goal_vel: false

      # Obstacles
      min_obstacle_dist: 0.27
      inflation_dist: 0.6
      include_costmap_obstacles: true
      costmap_obstacles_behind_robot_dist: 1.0
      obstacle_poses_affected: 15
      dynamic_obstacle_inflation_dist: 0.6
      include_dynamic_obstacles: true
      # Measured: default costmap_converter (background thread vectorizing
      # the whole local costmap into polygons every 200ms) plus
      # no_inner/outer_iterations 5x4 made this controller_server cost 5-6x
      # more CPU than the already-tuned MPPI it replaced (65.7% vs 10.9% avg,
      # both robots navigating). Tried disabling costmap_converter (raw
      # costmap-cell point obstacles instead of polygons) to cut that to
      # 16.7%, but point obstacles are unreliable at tight corners - observed
      # the planned path cutting a wall corner in rviz. Keeping
      # costmap_converter on trades that CPU savings back for reliable
      # polygon-based clearance; iterations still cut to 2x2 (20->4 passes)
      # and homotopy planning still off, so this is 54.4% vs the 65.7%
      # un-tuned default, not back to square one.
      costmap_converter_plugin: "costmap_converter::CostmapToPolygonsDBSMCCH"
      costmap_converter_spin_thread: true
      costmap_converter_rate: 5

      # Optimization
      no_inner_iterations: 2
      no_outer_iterations: 2
      optimization_activate: true
      optimization_verbose: false
      penalty_epsilon: 0.1
      obstacle_cost_exponent: 4.0
      weight_max_vel_x: 0.5
      weight_max_vel_theta: 0.5
      weight_acc_lim_x: 0.5
      weight_acc_lim_theta: 10.5
      weight_kinematics_nh: 1000.0
      weight_kinematics_forward_drive: 3.0
      weight_kinematics_turning_radius: 1.0
      weight_optimaltime: 1.0
      weight_shortest_path: 0.0
      weight_obstacle: 100.0
      weight_inflation: 0.2
      weight_dynamic_obstacle: 10.0
      weight_dynamic_obstacle_inflation: 0.2
      weight_viapoint: 50.0
      weight_adapt_factor: 2.0

      # Homotopy Class Planner
      enable_homotopy_class_planning: false
      enable_multithreading: true
      max_number_classes: 4
      selection_cost_hysteresis: 5.0
      selection_prefer_initial_plan: 1.0
      selection_obst_cost_scale: 1.0
      selection_alternative_time_cost: true
      roadmap_graph_no_samples: 15
      roadmap_graph_area_width: 5.0
      roadmap_graph_area_length_scale: 1.0
      h_signature_prescaler: 0.5
      h_signature_threshold: 0.1
      obstacle_heading_threshold: 0.45
      switching_blocking_period: 0.0
      viapoints_all_candidates: true
      delete_detours_backwards: true
      max_ratio_detours_duration_best_duration: 3.0
      visualize_hc_graph: false
      visualize_with_time_as_z_axis_scale: 0.0

      # Recovery
      shrink_horizon_backup: true
      shrink_horizon_min_duration: 10.0
      oscillation_recovery: true
      oscillation_v_eps: 0.1
      oscillation_omega_eps: 0.1
      oscillation_recovery_min_duration: 10.0
      oscillation_filter_duration: 10.0

local_costmap:
  local_costmap:
    ros__parameters:
      update_frequency: 5.0
      publish_frequency: 2.0
      global_frame: odom
      robot_base_frame: base_link
      rolling_window: true
      width: 3
      height: 3
      resolution: 0.05
      # Exact circumscribed radius of the real chassis (0.320m x 0.240m box
      # centered on base_link, see robot_main.xacro) - sqrt(0.16^2+0.12^2).
      robot_radius: 0.20
      plugins: ["voxel_layer", "inflation_layer"]
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        # Was 0.70 - 3.5x the robot's own 0.20m radius, eating into aisle
        # clearance that was already tight (some corridors measured ~0.95m
        # center-to-wall). robot_radius + ~50% buffer is plenty for a
        # smooth cost gradient without being oversized relative to the robot.
        inflation_radius: 0.30
      voxel_layer:
        plugin: "nav2_costmap_2d::VoxelLayer"
        enabled: True
        publish_voxel_map: True
        origin_z: 0.0
        z_resolution: 0.05
        z_voxels: 16
        max_obstacle_height: 2.0
        mark_threshold: 0
        observation_sources: scan
        scan:
          # Relative (not /scan): must stay inside this robot's namespace push,
          # or every robot's local costmap ends up reading the SAME scan topic.
          topic: scan
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          data_type: "LaserScan"
          raytrace_max_range: 3.0
          raytrace_min_range: 0.0
          obstacle_max_range: 2.5
          obstacle_min_range: 0.0
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: True
      always_send_full_costmap: True

global_costmap:
  global_costmap:
    ros__parameters:
      update_frequency: 1.0
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: base_link
      # Exact circumscribed radius of the real chassis (0.320m x 0.240m box
      # centered on base_link, see robot_main.xacro) - sqrt(0.16^2+0.12^2).
      robot_radius: 0.20
      resolution: 0.05
      track_unknown_space: true
      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        observation_sources: scan
        scan:
          # Relative (not /scan) - see local_costmap's scan.topic comment above.
          topic: scan
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          data_type: "LaserScan"
          raytrace_max_range: 3.0
          raytrace_min_range: 0.0
          obstacle_max_range: 2.5
          obstacle_min_range: 0.0
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: True
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        # Was 0.05 - smaller than the robot's own inscribed radius (0.12),
        # which nav2 warned about on every startup ("configured inflation
        # radius is smaller than the computed inscribed radius") but nothing
        # acted on: with almost no cost gradient around obstacles, the
        # global planner treated paths grazing a wall corner as cheap and
        # routed straight through them. 0.30 = robot_radius (0.20) + ~50%
        # buffer - fixes that without the 0.70 in an earlier pass, which
        # was 3.5x the robot's actual size and ate into aisle clearance.
        cost_scaling_factor: 3.0
        inflation_radius: 0.30
      always_send_full_costmap: True

map_saver:
  ros__parameters:
    save_map_timeout: 5.0
    free_thresh_default: 0.25
    occupied_thresh_default: 0.65
    map_subscribe_transient_local: True

planner_server:
  ros__parameters:
    expected_planner_frequency: 20.0
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_navfn_planner::NavfnPlanner"
      tolerance: 0.5
      use_astar: true
      allow_unknown: true

smoother_server:
  ros__parameters:
    smoother_plugins: ["simple_smoother"]
    simple_smoother:
      plugin: "nav2_smoother::SimpleSmoother"
      tolerance: 1.0e-10
      max_its: 1000
      do_refinement: True

behavior_server:
  ros__parameters:
    # Multi-robot uses the native gz-sim-diff-drive-system plugin (not
    # ros2_control's diff_drive_controller), whose ros_gz_bridge topic is
    # declared as plain geometry_msgs/Twist (see multi_robot.launch.py's
    # bridge_node) - unlike single-robot's nav2.yaml, this must stay false or
    # the final /cmd_vel type (TwistStamped) silently mismatches the bridge
    # and no velocity command ever reaches Gazebo.
    enable_stamped_cmd_vel: false
    local_costmap_topic: local_costmap/costmap_raw
    global_costmap_topic: global_costmap/costmap_raw
    local_footprint_topic: local_costmap/published_footprint
    global_footprint_topic: global_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: ["spin", "backup", "drive_on_heading", "assisted_teleop", "wait"]
    spin:
      plugin: "nav2_behaviors::Spin"
    backup:
      plugin: "nav2_behaviors::BackUp"
    drive_on_heading:
      plugin: "nav2_behaviors::DriveOnHeading"
    wait:
      plugin: "nav2_behaviors::Wait"
    assisted_teleop:
      plugin: "nav2_behaviors::AssistedTeleop"
    local_frame: odom
    global_frame: map
    robot_base_frame: base_link
    transform_tolerance: 0.1
    simulate_ahead_time: 2.0
    max_rotational_vel: 1.0
    min_rotational_vel: 0.4
    rotational_acc_lim: 3.2

waypoint_follower:
  ros__parameters:
    loop_rate: 20
    stop_on_failure: false
    action_server_result_timeout: 900.0
    waypoint_task_executor_plugin: "wait_at_waypoint"
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      enabled: True
      waypoint_pause_duration: 200

velocity_smoother:
  ros__parameters:
    # Multi-robot uses the native gz-sim-diff-drive-system plugin (not
    # ros2_control's diff_drive_controller), whose ros_gz_bridge topic is
    # declared as plain geometry_msgs/Twist (see multi_robot.launch.py's
    # bridge_node) - unlike single-robot's nav2.yaml, this must stay false or
    # the final /cmd_vel type (TwistStamped) silently mismatches the bridge
    # and no velocity command ever reaches Gazebo.
    enable_stamped_cmd_vel: false
    smoothing_frequency: 20.0
    scale_velocities: False
    feedback: "OPEN_LOOP"
    max_velocity: [1.0, 0.0, 2.5]
    min_velocity: [-0.6, 0.0, -2.5]
    max_accel: [2.5, 0.0, 3.2]
    max_decel: [-2.5, 0.0, -3.2]
    odom_topic: "odom"
    odom_duration: 0.1
    deadband_velocity: [0.0, 0.0, 0.0]
    velocity_timeout: 1.0

collision_monitor:
  ros__parameters:
    # Multi-robot uses the native gz-sim-diff-drive-system plugin (not
    # ros2_control's diff_drive_controller), whose ros_gz_bridge topic is
    # declared as plain geometry_msgs/Twist (see multi_robot.launch.py's
    # bridge_node) - unlike single-robot's nav2.yaml, this must stay false or
    # the final /cmd_vel type (TwistStamped) silently mismatches the bridge
    # and no velocity command ever reaches Gazebo.
    enable_stamped_cmd_vel: false
    base_frame_id: "base_footprint"
    odom_frame_id: "odom"
    cmd_vel_in_topic: "cmd_vel_smoothed"
    cmd_vel_out_topic: "cmd_vel"
    state_topic: "collision_monitor_state"
    transform_tolerance: 0.2
    source_timeout: 1.0
    base_shift_correction: True
    stop_pub_timeout: 2.0
    # Polygons represent zone around the robot for "stop", "slowdown" and "limit" action types,
    # and robot footprint for "approach" action type.
    polygons: ["FootprintApproach"]
    FootprintApproach:
      type: "polygon"
      action_type: "approach"
      # Relative (not /local_costmap/...): same namespacing reason as the scan
      # topics above.
      footprint_topic: "local_costmap/published_footprint"
      time_before_collision: 1.2
      simulation_time_step: 0.1
      min_points: 6
      visualize: False
      enabled: True
    observation_sources: ["scan"]
    scan:
      type: "scan"
      topic: "scan"
      min_height: 0.15
      max_height: 2.0
      enabled: True

docking_server:
  ros__parameters:
    # Multi-robot uses the native gz-sim-diff-drive-system plugin (not
    # ros2_control's diff_drive_controller), whose ros_gz_bridge topic is
    # declared as plain geometry_msgs/Twist (see multi_robot.launch.py's
    # bridge_node) - unlike single-robot's nav2.yaml, this must stay false or
    # the final /cmd_vel type (TwistStamped) silently mismatches the bridge
    # and no velocity command ever reaches Gazebo.
    enable_stamped_cmd_vel: false
    controller_frequency: 50.0
    initial_perception_timeout: 5.0
    wait_charge_timeout: 5.0
    dock_approach_timeout: 30.0
    undock_linear_tolerance: 0.05
    undock_angular_tolerance: 0.1
    max_retries: 3
    base_frame: "base_link"
    fixed_frame: "odom"
    dock_backwards: false
    dock_prestaging_tolerance: 0.5

    # Types of docks
    dock_plugins: ['simple_charging_dock']
    simple_charging_dock:
      plugin: 'opennav_docking::SimpleChargingDock'
      docking_threshold: 0.05
      staging_x_offset: -0.7
      use_external_detection_pose: true
      use_battery_status: false # true
      use_stall_detection: false # true

      external_detection_timeout: 1.0
      external_detection_translation_x: -0.18
      external_detection_translation_y: 0.0
      external_detection_rotation_roll: -1.57
      external_detection_rotation_pitch: -1.57
      external_detection_rotation_yaw: 0.0
      filter_coef: 0.1

    # Dock instances
    # The following example illustrates configuring dock instances.
    # docks: ['home_dock']  # Input your docks here
    # home_dock:
    #   type: 'simple_charging_dock'
    #   frame: map
    #   pose: [0.0, 0.0, 0.0]

    controller:
      k_phi: 3.0
      k_delta: 2.0
      v_linear_min: 0.15
      v_linear_max: 0.15
